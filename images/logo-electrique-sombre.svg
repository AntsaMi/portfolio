<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D1A"/>
      <stop offset="100%" stop-color="#130D2E"/>
    </linearGradient>
    <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="round">
      <rect width="200" height="200" rx="36" ry="36"/>
    </clipPath>
  </defs>

  <!-- Fond arrondi -->
  <rect width="200" height="200" rx="36" ry="36" fill="url(#bg)"/>

  <g clip-path="url(#round)">
    <!-- A avec dégradé + glow -->
    <path d="M100 22 C93 22,87 26,84 33 L19 163 C16 170,21 178,29 178 L50 178 C56 178,62 174,65 168 L100 97 L135 168 C138 174,144 178,150 178 L171 178 C179 178,184 170,181 163 L116 33 C113 26,107 22,100 22 Z" fill="url(#ag)" filter="url(#glow)"/>

    <!-- Découpe grande et nette -->
    <polygon points="110,115 180,178 148,178 98,115" fill="url(#bg)"/>

    <!-- Fragment stylé -->
    <polygon points="148,140 172,178 150,178 128,146" fill="url(#fg)"/>
  </g>

</svg>